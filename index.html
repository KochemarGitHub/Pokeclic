function weightedRandom(list, weights){
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;

  for(let i=0;i<list.length;i++){
    if(r < weights[i]) return list[i];
    r -= weights[i];
  }
  return list[0];
}

function clickEgg(element, type){

  let clicks = parseInt(element.dataset.clicks || "0");
  clicks++;

  element.dataset.clicks = clicks;

  element.classList.add("wiggle");
  setTimeout(()=>element.classList.remove("wiggle"), 300);

  element.style.transform = `scale(${1 + clicks * 0.08})`;

  if(clicks >= 3){
    element.style.opacity = "0";

    setTimeout(()=>{
      openEgg(type);
    },200);
  }
}

function openEgg(type){

  if(eggs[type] <= 0) return;

  eggs[type]--;
  totalEggsOpened++;
  let pool = [];
  let weights = [];

  if(type === "common"){
    pool = POKEMON_RARITY.common;
    weights = pool.map(()=>1);
  }

  if(type === "rare"){
    pool = [...POKEMON_RARITY.common, ...POKEMON_RARITY.rare];
    weights = pool.map(id =>
      POKEMON_RARITY.common.includes(id) ? 70 : 30
    );
  }

  if(type === "epic"){
    pool = [...POKEMON_RARITY.rare, ...POKEMON_RARITY.epic];
    weights = pool.map(id =>
      POKEMON_RARITY.rare.includes(id) ? 60 : 25
    );
  }

  if(type === "legendary"){
    pool = POKEMON_RARITY.legendary;
    weights = pool.map(id =>
      (id === 150 || id === 151) ? 1 : 10
    );
  }

  const id = weightedRandom(pool, weights);

  // ✅ IMPORTANT : on définit AVANT
  const pokemon = pokedex[id-1];

  if(!pokemon.unlocked){
    pokemon.unlocked = true;
    showNotification("Pokemon obtenu : " + pokemon.name);
  } else {
    diamonds += 50;
    showNotification("Doublon +50 perles");
  }

  updateStats();
  save();
  render();
}

function load(){

  const d = JSON.parse(localStorage.getItem("clickerSave"));
  if(!d) return;

  total = d.total ?? 0;
  cpcBase = d.cpcBase ?? 1;
  cpcMultiplier = d.cpcMultiplier ?? 1;
  diamonds = d.diamonds ?? 0;
  level = d.level ?? 1;
  xp = d.xp ?? 0;
  eggs = d.eggs ?? eggs;

  // 🔥 REBUILD SAFE
  clickUpgrade = {
    level: d.clickUpgrade?.level ?? 0,
    base: 1,
    cost: Math.floor(20 * Math.pow(1.12, d.clickUpgrade?.level ?? 0))
  };

  autoClick = {
    level: d.autoClick?.level ?? 0,
    cps: d.autoClick?.cps ?? 0,
    cost: Math.floor(15 * Math.pow(1.15, d.autoClick?.level ?? 0))
  };

  if(d.achievements){
    achievements.forEach((a,i)=>{
      a.unlocked = d.achievements[i]?.unlocked || false;
    });
  }

  if(d.pokedex){
    pokedex.forEach((p,i)=>{
      p.unlocked = d.pokedex[i]?.unlocked || false;
    });
  }
}

function addXP(amount){
  xp+=amount;

  while(level<maxLevel && xp>=xpForLevel(level)){
    xp-=xpForLevel(level);
    level++;
    clicksThisLevel = 0; // reset
    showNotification(`Niveau ${level} atteint !`);
  }
}
function updateXPBar(){document.getElementById("level-text").textContent=`Niveau : ${level}`;const nextXP=xpForLevel(level);document.getElementById("xp-fill").style.width=`${Math.min(100,(xp/nextXP)*100)}%`;document.getElementById("xp-text").textContent=`${xp} / ${nextXP} XP`;}

function unlockAchievement(a){

  a.unlocked = true;

  showNotification("Succès : " + a.name);

  if(a.reward.pearls) diamonds += a.reward.pearls;
  if(a.reward.cpc) cpcBase += a.reward.cpc;
  if(a.reward.cps) autoClick.cps += a.reward.cps;

  if(a.reward.eggs){
    Object.keys(a.reward.eggs).forEach(type=>{
      eggs[type] += a.reward.eggs[type];
    });
  }

  save();
}

// ===== CHECK SUCCÎ±ÃªS =====
function checkAchievements(){

  achievements.forEach(a=>{

    if(a.unlocked) return;

    let value = 0;

    switch(a.type){

      case "pearls": value = diamonds; break;
      case "click": value = getCPC(); break;
      case "total_clicks": value = total; break;
      case "click_in_level": value = clicksThisLevel; break;
      case "level": value = level; break;
      case "eggs": value = totalEggsOpened; break;
      case "success_count": value = achievements.filter(x=>x.unlocked).length; break;
      case "pokemon_family": value = checkPokemonFamily(a.family); break;

    }

    if(value >= a.goal){
      unlockAchievement(a);
    }

  });

}

function spawnFallingBalls(){

  const mainBall = document.getElementById("pokeball");
  const rect = mainBall.getBoundingClientRect();

  const ball = document.createElement("img");
  ball.src = "images/pokeball.jpeg";
  ball.className = "falling-ball";

  // centre de la pokÎ˜ball
  const centerX = rect.left + rect.width/2;
  const centerY = rect.top + rect.height/2;

  // angle alÎ˜atoire autour de la pokÎ˜ball
  const angle = Math.random() * Math.PI * 2;

  // rayon (distance depuis le centre Î“Â¶ÃŠ bord)
  const radius = rect.width / 2;

  // position de dÎ˜part (autour du cercle)
  const startX = centerX + Math.cos(angle) * radius;
  const startY = centerY + Math.sin(angle) * radius;

  ball.style.left = startX + "px";
  ball.style.top = startY + "px";

  document.body.appendChild(ball);

  // direction vers le bas avec un peu de dispersion
  const randomX = (Math.random() - 0.5) * 100;
  const randomY = 250 + Math.random()*150;

  ball.animate([
    {
      transform: `translate(0,0) rotate(0deg)`,
      opacity:1
    },
    {
      transform: `translate(${randomX}px, ${randomY}px) rotate(360deg)`,
      opacity:0
    }
  ],{
    duration:900,
    easing:"ease-out"
  });

  setTimeout(()=>ball.remove(),900);
}

// ===== AUTO CLICK CPS =====

const autoDiv = document.createElement("div");
autoDiv.className = "shop-item";

autoDiv.innerHTML = `
<div class="shop-info">
  <h4>Auto clic</h4>
  <p>+${Math.floor(1 + autoClick.level * 0.95)} CPS</p>
  <p class="price">Prix : ${Math.floor(autoClick.cost)} perles</p>
</div>`;

// bouton
const autoBtn = document.createElement("button");
autoBtn.className = "buy-btn";
autoBtn.textContent = "Acheter";

// sécurité affichage
autoBtn.disabled = diamonds < autoClick.cost;

// click
autoBtn.onclick = () => {

  if (diamonds < autoClick.cost) return; // 🔒 sécurité

  diamonds -= autoClick.cost;

  autoClick.level ??= 0;
  autoClick.cps ??= 0;

  autoClick.level++;

  // gain CPS
  autoClick.cps += Math.floor(1 + autoClick.level * 0.5);

  // bonus tous les 10 niveaux
  if (autoClick.level % 10 === 0) {
    autoClick.cps = Math.floor(autoClick.cps * 1.3);
  }

  // nouveau prix
  autoClick.cost = Math.floor(15 * Math.pow(1.15, autoClick.level));

  updateStats();
  renderShop();
  save();
};

// ajout bouton
autoDiv.appendChild(autoBtn);

// sécurité DOM
if (autoShop) autoShop.appendChild(autoDiv);

// ===== POKÎ±Ã«MON SHOP =====

pokemonShop.forEach(p=>{

  if(pokedex[p.id-1].unlocked) return;

  const pokeDiv = document.createElement("div");
  pokeDiv.className = "shop-item";

  pokeDiv.innerHTML = `
  <div class="shop-info">
    <h4>${p.name}</h4>
    <p class="price">${p.cost} perles</p>
  </div>`;

  const btn = document.createElement("button");
  btn.className = "buy-btn";
  btn.textContent = "Acheter";
  btn.disabled = diamonds < p.cost;

  btn.onclick = ()=>{
    if(diamonds >= p.cost){
      diamonds -= p.cost;
      pokedex[p.id-1].unlocked = true;

      showNotification("Pokémon obtenu : " + p.name);

      updateStats();
      renderShop();
      save();
    }
  };

  pokeDiv.appendChild(btn);
  pokemonShopDiv.appendChild(pokeDiv); // ✅ IMPORTANT
});
}

// ===== NAVIGATION =====
document.querySelectorAll("nav a").forEach(a=>{
  a.onclick=e=>{
    e.preventDefault();

  };
});

// ===== RESET =====
document.getElementById("reset").onclick=()=>{
  const confirmReset = confirm("Es-tu sûr de vouloir tout Réinitialiser ?");
  if(!confirmReset) return;

  // reset variables
  total=0;
  cpcBase=1;
  cpcMultiplier=1;
  diamonds=0;
  level=1;
  xp=0;

  eggs = {
    common: 0,
    rare: 0,
    epic: 0,
    legendary: 0
  };

  // 🔥 RESET PROPRE DES UPGRADES
  clickUpgrade = {
    level:0,
    base:1,
    cost:20
  };

  autoClick = {
    level:0,
    cps:0,
    cost:15
  };

  achievements.forEach(a=>a.unlocked=false);
  pokedex.forEach(p=>p.unlocked=false);

  // 🔥 SUPPRIME LA SAVE
  localStorage.removeItem("clickerSave");

  render(); // ❗ PAS DE SAVE ICI
};

// ===== NOTIFICATIONS =====
function showNotification(text){
  const container = document.getElementById("notif-container");
  const notif = document.createElement("div");
  notif.className = "notif";
  notif.textContent = text;
  container.appendChild(notif);
  setTimeout(()=>notif.remove(),3000);
}

// ===== INITIAL RENDER =====
load();   // 🔥 charge la sauvegarde
render();

function spawnFallingBalls(){

  const ball = document.createElement("img");
  ball.src = "images/pokeball.jpeg";
  ball.className = "falling-ball";

  // position aléatoire sur toute la largeur
  ball.style.left = Math.random() * window.innerWidth + "px";

  // durée aléatoire pour effet naturel
  const duration = 1.5 + Math.random() * 2;
  ball.style.animationDuration = duration + "s";

  document.body.appendChild(ball);

  setTimeout(()=>ball.remove(), duration * 1000);
}
document.getElementById("secret-heart").onclick = () => {

let lastTouchEnd = 0;

document.addEventListener('touchend', function (event) {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) {
    event.preventDefault();
  }
  lastTouchEnd = now;
}, false);
